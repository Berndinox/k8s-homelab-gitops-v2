---
# BGPv2 — Cilium ↔ VyOS HA Peering over VLAN 100
# Cilium ASN 65100 peers with VyOS AS 65200
# BGP ECMP: beide VyOS-Instanzen sind immer aktive Peers → Failover < 2s (keine Reconvergenz)
# Advertises: Pod CIDRs + LoadBalancer Service IPs (DMZ 10.0.10.200/28, Server 10.0.50.200/28)

# Cluster-wide BGP config: enable BGP on all nodes
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-cluster
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: default
      localASN: 65100
      peers:
        - name: vyos-01
          peerConfigRef:
            name: vyos-peer
          peerAddress: 10.0.100.2
          peerASN: 65200
        - name: vyos-02
          peerConfigRef:
            name: vyos-peer
          peerAddress: 10.0.100.3
          peerASN: 65200
---
# Peer config: aggressivere Timers für schnelleres Failover-Erkennen
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeerConfig
metadata:
  name: vyos-peer
spec:
  timers:
    holdTimeSeconds: 30
    keepAliveTimeSeconds: 10
    connectRetryTimeSeconds: 10
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 60
  families:
    - afi: ipv4
      safi: unicast
---
# What to advertise: Pod CIDRs + LoadBalancer IPs
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPAdvertisement
metadata:
  name: bgp-advertisements
spec:
  advertisements:
    - advertisementType: PodCIDR
    - advertisementType: Service
      service:
        addresses:
          - ExternalIP
          - LoadBalancerIP
      selector:
        matchExpressions:
          - key: somekey
            operator: NotIn
            values: ["never-match"]
