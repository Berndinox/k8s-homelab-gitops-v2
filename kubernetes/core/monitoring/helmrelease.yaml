apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
  install:
    crds: Create
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # -- VMSingle (storage) --
    vmsingle:
      spec:
        retentionPeriod: "14d"
        extraArgs:
          maxLabelsPerTimeseries: "200"
        storage:
          storageClassName: longhorn
          resources:
            requests:
              storage: 20Gi

    # -- Grafana --
    grafana:
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 2Gi
      adminPassword: "admin"

    # -- Talos: kein kube-proxy (Cilium) --
    kubeProxy:
      enabled: false

    # -- Talos: etcd/scheduler/controller-manager Endpoints --
    kubeEtcd:
      enabled: true
      endpoints:
        - 10.0.200.11
        - 10.0.200.12
        - 10.0.200.13
    kubeScheduler:
      enabled: true
      endpoints:
        - 10.0.200.11
        - 10.0.200.12
        - 10.0.200.13
    kubeControllerManager:
      enabled: true
      endpoints:
        - 10.0.200.11
        - 10.0.200.12
        - 10.0.200.13

    # -- Drop KubeVirt CPU-feature labels from node scrapes --
    kubelet:
      vmScrape:
        spec:
          metricRelabelConfigs:
            - action: labeldrop
              regex: cpu_feature_node_kubevirt_io_.*

    # -- Components --
    prometheus-node-exporter:
      enabled: true
    kube-state-metrics:
      enabled: true
    alertmanager:
      enabled: false
    vmalert:
      enabled: false
