apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
  install:
    crds: Create
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # -- VMSingle (storage) --
    vmsingle:
      spec:
        retentionPeriod: "14d"
        extraArgs:
          maxLabelsPerTimeseries: "40"
        storage:
          storageClassName: longhorn
          resources:
            requests:
              storage: 20Gi

    # -- Grafana --
    grafana:
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 2Gi
      adminPassword: "admin"

    # -- Talos: kein kube-proxy (Cilium) --
    kubeProxy:
      enabled: false

    # -- Talos: etcd/scheduler/controller-manager Endpoints --
    kubeEtcd:
      enabled: true
      endpoints:
        - 10.0.200.11
        - 10.0.200.12
        - 10.0.200.13
    kubeScheduler:
      enabled: true
      endpoints:
        - 10.0.200.11
        - 10.0.200.12
        - 10.0.200.13
    kubeControllerManager:
      enabled: true
      endpoints:
        - 10.0.200.11
        - 10.0.200.12
        - 10.0.200.13

    # -- VMAgent tuning --
    vmagent:
      spec:
        extraArgs:
          promscrape.disableCompression: "true"
        extraEnvs:
          - name: GOGC
            value: "60"

    # -- Drop KubeVirt labels (435 per node) from all node scrapes --
    # -- Drop unused cAdvisor metrics (keep only essentials) --
    kubelet:
      vmScrape:
        spec:
          metricRelabelConfigs:
            - action: labeldrop
              regex: .*kubevirt.*
      cadvisor:
        metricRelabelConfigs:
          - action: labeldrop
            regex: .*kubevirt.*
          - action: labeldrop
            regex: id|name|image
          - action: keep
            sourceLabels: [__name__]
            regex: container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_memory_rss|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_fs_usage_bytes|container_fs_limit_bytes|container_last_seen
      probes:
        metricRelabelConfigs:
          - action: labeldrop
            regex: .*kubevirt.*
      resource:
        metricRelabelConfigs:
          - action: labeldrop
            regex: .*kubevirt.*

    # -- Components --
    prometheus-node-exporter:
      enabled: true
    kube-state-metrics:
      enabled: true
    alertmanager:
      enabled: false
    vmalert:
      enabled: false
