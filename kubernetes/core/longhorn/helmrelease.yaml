apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 10m
  chart:
    spec:
      chart: longhorn
      version: 1.11.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    crds: Create
    disableHooks: true
  upgrade:
    crds: CreateReplace
    disableHooks: true
  values:
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false
    defaultSettings:
      defaultDataPath: /var/mnt/longhorn
      defaultReplicaCount: 1
      storageMinimalAvailablePercentage: 10
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 1
    longhornUI:
      replicas: 1
