apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/kubevirt/cluster-network-addons-operator/releases/download/v0.95.0/namespace.yaml
  - https://github.com/kubevirt/cluster-network-addons-operator/releases/download/v0.95.0/network-addons-config.crd.yaml
  - https://github.com/kubevirt/cluster-network-addons-operator/releases/download/v0.95.0/operator.yaml
  - network-addons-config.yaml
  - macvtap-deviceplugin-config.yaml
patches:
  - target:
      kind: Namespace
      name: cluster-network-addons
    patch: |
      - op: add
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: privileged
