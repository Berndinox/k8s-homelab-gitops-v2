apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: mikrotik
  namespace: infra
spec:
  interval: 10m
  approvePlan: auto
  path: ./kubernetes/infra/mikrotik/terraform
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  serviceAccountName: tf-runner
  runnerPodTemplate:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":"vlan200-mgmt","namespace":"infra"}]'
  vars:
    - name: mikrotik_user
      valueFrom:
        secretKeyRef:
          name: mikrotik-credentials
          key: username
    - name: mikrotik_password
      valueFrom:
        secretKeyRef:
          name: mikrotik-credentials
          key: password
