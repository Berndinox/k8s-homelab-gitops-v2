---
# OpenTofu reconciliation CronJob for MikroTik
#
# STATE:      K8s Secret "tfstate-default-mikrotik" in namespace infra
# TERRAFORM:  Cloned from public GitHub repo (no auth needed)
#
# INITIAL WORKFLOW:
#   1. Set real credentials in secret-credentials.yaml (or via kubectl)
#   2. Run plan first:
#      kubectl create job -n infra --from=cronjob/mikrotik-terraform plan-$(date +%s)
#      kubectl -n infra logs -l job-name=plan-... -f
#   3. If plan looks correct, set suspended: false for automatic reconciliation
#
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mikrotik-terraform
  namespace: infra
spec:
  # Run every 10 minutes for drift detection
  schedule: "*/10 * * * *"
  # Start suspended — manually trigger first run to verify plan
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: mikrotik-terraform
        spec:
          serviceAccountName: tofu-mikrotik
          restartPolicy: Never
          containers:
            - name: tofu
              image: ghcr.io/opentofu/opentofu:1.9.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  REPO="https://github.com/Berndinox/k8s-homelab-gitops-v2"
                  TF_PATH="kubernetes/infra/mikrotik/terraform"

                  echo "==> Cloning repo..."
                  git clone --depth 1 --branch main "$REPO" /workspace
                  cd "/workspace/$TF_PATH"

                  echo "==> Init..."
                  tofu init -reconfigure

                  echo "==> Plan..."
                  tofu plan \
                    -var="mikrotik_user=$MIKROTIK_USER" \
                    -var="mikrotik_password=$MIKROTIK_PASSWORD"

                  echo "==> Apply..."
                  tofu apply -auto-approve \
                    -var="mikrotik_user=$MIKROTIK_USER" \
                    -var="mikrotik_password=$MIKROTIK_PASSWORD"

                  echo "==> Done."
              env:
                - name: MIKROTIK_USER
                  valueFrom:
                    secretKeyRef:
                      name: mikrotik-credentials
                      key: username
                - name: MIKROTIK_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mikrotik-credentials
                      key: password
                # Terraform kubernetes backend — in-cluster auth via ServiceAccount
                - name: KUBE_IN_CLUSTER
                  value: "true"
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
