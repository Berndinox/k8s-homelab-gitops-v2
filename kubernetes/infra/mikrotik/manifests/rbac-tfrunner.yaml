apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf-runner
  namespace: infra
---
# RBAC grants the runner access to the Kubernetes backend state (tfstate secret).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-runner-state
  namespace: infra
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-runner-state
  namespace: infra
subjects:
  - kind: ServiceAccount
    name: tf-runner
    namespace: infra
roleRef:
  kind: Role
  name: tf-runner-state
  apiGroup: rbac.authorization.k8s.io
