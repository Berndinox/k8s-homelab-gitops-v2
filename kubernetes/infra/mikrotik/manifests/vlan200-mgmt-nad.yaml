apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan200-mgmt
  namespace: infra
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "bond0.200",
      "mode": "bridge",
      "ipam": {
        "type": "static",
        "addresses": [
          { "address": "10.0.200.20/32" }
        ],
        "routes": [
          { "dst": "10.0.200.254/32" }
        ]
      }
    }
