---
# MikroTik API credentials for Terraform
# BEFORE APPLYING: replace placeholder values with real credentials
# Create manually (not in git with real values):
#   kubectl -n infra create secret generic mikrotik-credentials \
#     --from-literal=username=admin \
#     --from-literal=password=YOUR_REAL_PASSWORD
#
# Or use sealed-secrets (kubeseal) to encrypt and commit safely.
apiVersion: v1
kind: Secret
metadata:
  name: mikrotik-credentials
  namespace: infra
type: Opaque
stringData:
  username: admin
  password: "__CHANGE_ME__"
