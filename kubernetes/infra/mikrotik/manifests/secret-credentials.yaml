---
# MikroTik API credentials — SealedSecret (safe to commit)
#
# EINMALIG GENERIEREN (sealed-secrets Controller muss laufen):
#   kubectl -n infra create secret generic mikrotik-credentials \
#     --from-literal=username=admin \
#     --from-literal=password=REAL_PASSWORD \
#     --dry-run=client -o yaml \
#     | kubeseal --namespace infra --name mikrotik-credentials \
#     > kubernetes/infra/mikrotik/manifests/secret-credentials.yaml
#
# Danach committen — verschlüsselt, sicher im Git.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mikrotik-credentials
  namespace: infra
spec:
  encryptedData:
    username: "__SEAL_ME__"
    password: "__SEAL_ME__"
  template:
    metadata:
      name: mikrotik-credentials
      namespace: infra
    type: Opaque
