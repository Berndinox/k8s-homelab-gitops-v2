apiVersion: v1
kind: Secret
metadata:
  name: router-cloudinit
  namespace: infra
type: Opaque
stringData:
  userdata: |
    #cloud-config
    vyos_config_commands:
      # Interfaces
      - set interfaces ethernet eth0 address dhcp
      - set interfaces ethernet eth0 description 'WAN'
      - set interfaces ethernet eth1 address '10.0.50.2/24'
      - set interfaces ethernet eth1 description 'Transit to MikroTik'

      # Routing — all RFC1918 via MikroTik (inkl. Pod-CIDRs 10.244.0.0/16)
      - set protocols static route 10.0.0.0/8 next-hop 10.0.50.1

      # NAT — einziger NAT im gesamten Netzwerk
      - set nat source rule 100 outbound-interface name 'eth0'
      - set nat source rule 100 source address '10.0.0.0/8'
      - set nat source rule 100 translation address masquerade

      # Firewall — zone-based
      - set firewall group network-group RFC1918 network '10.0.0.0/8'
      - set firewall group network-group RFC1918 network '172.16.0.0/12'
      - set firewall group network-group RFC1918 network '192.168.0.0/16'

      - set firewall ipv4 name WAN-LOCAL default-action drop
      - set firewall ipv4 name WAN-LOCAL rule 10 action accept
      - set firewall ipv4 name WAN-LOCAL rule 10 state established
      - set firewall ipv4 name WAN-LOCAL rule 10 state related
      - set firewall ipv4 name WAN-LOCAL rule 20 action drop
      - set firewall ipv4 name WAN-LOCAL rule 20 state invalid

      - set firewall ipv4 name WAN-LAN default-action drop
      - set firewall ipv4 name WAN-LAN rule 10 action accept
      - set firewall ipv4 name WAN-LAN rule 10 state established
      - set firewall ipv4 name WAN-LAN rule 10 state related

      - set firewall ipv4 name LAN-WAN default-action accept

      - set zone-policy zone WAN interface eth0
      - set zone-policy zone WAN default-action drop
      - set zone-policy zone WAN from LAN firewall name LAN-WAN
      - set zone-policy zone LAN interface eth1
      - set zone-policy zone LAN default-action drop
      - set zone-policy zone LAN from WAN firewall name WAN-LAN
      - set zone-policy zone WAN local-redirect firewall name WAN-LOCAL

      # Services
      - set service ssh listen-address '10.0.50.2'
      - set service ntp server time.cloudflare.com

      # User — SSH-key only, delete default vyos user
      - set system login user admin authentication public-keys main type ssh-ed25519
      - set system login user admin authentication public-keys main key 'AAAAC3NzaC1lZDI1NTE5AAAAIGt1cCMyHiOOBXG+BRus/fHXML2CNe0eYSFgDYq4AOTV'
      - delete system login user vyos
      - set service ssh disable-password-authentication

      # System
      - set system host-name 'router'
      - set system time-zone 'Europe/Vienna'
