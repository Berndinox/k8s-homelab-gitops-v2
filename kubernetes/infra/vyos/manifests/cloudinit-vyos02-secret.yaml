apiVersion: v1
kind: Secret
metadata:
  name: cloudinit-vyos-02
  namespace: infra
type: Opaque
stringData:
  userdata: |
    #cloud-config
    vyos_config_commands:
      # ── Interfaces ─────────────────────────────────────────
      - set interfaces ethernet eth0 address dhcp
      - set interfaces ethernet eth0 description WAN
      - set interfaces ethernet eth1 address 10.0.10.3/24
      - set interfaces ethernet eth1 description DMZ
      - set interfaces ethernet eth2 address 10.0.30.3/24
      - set interfaces ethernet eth2 description WiFi-Guest
      - set interfaces ethernet eth3 address 10.0.40.3/24
      - set interfaces ethernet eth3 description Client
      - set interfaces ethernet eth4 address 10.0.50.3/24
      - set interfaces ethernet eth4 description Server
      - set interfaces ethernet eth5 address 10.0.60.3/24
      - set interfaces ethernet eth5 description WiFi-Secure
      - set interfaces ethernet eth6 address 10.0.100.3/24
      - set interfaces ethernet eth6 description Cluster
      - set interfaces ethernet eth7 address 10.0.200.3/24
      - set interfaces ethernet eth7 description MGMT

      # ── VRRP (VIP=.1 auf VLANs 10/30/40/50/60/200, backup prio 100)
      # VLAN 100: KEIN VRRP — BGP ECMP direkt zu .2/.3 (Failover < 2s, keine Reconvergenz)
      - set high-availability vrrp group vlan10 interface eth1
      - set high-availability vrrp group vlan10 vrid 10
      - set high-availability vrrp group vlan10 priority 100
      - set high-availability vrrp group vlan10 address 10.0.10.1/24
      - set high-availability vrrp group vlan30 interface eth2
      - set high-availability vrrp group vlan30 vrid 30
      - set high-availability vrrp group vlan30 priority 100
      - set high-availability vrrp group vlan30 address 10.0.30.1/24
      - set high-availability vrrp group vlan40 interface eth3
      - set high-availability vrrp group vlan40 vrid 40
      - set high-availability vrrp group vlan40 priority 100
      - set high-availability vrrp group vlan40 address 10.0.40.1/24
      - set high-availability vrrp group vlan50 interface eth4
      - set high-availability vrrp group vlan50 vrid 50
      - set high-availability vrrp group vlan50 priority 100
      - set high-availability vrrp group vlan50 address 10.0.50.1/24
      - set high-availability vrrp group vlan60 interface eth5
      - set high-availability vrrp group vlan60 vrid 60
      - set high-availability vrrp group vlan60 priority 100
      - set high-availability vrrp group vlan60 address 10.0.60.1/24
      - set high-availability vrrp group vlan200 interface eth7
      - set high-availability vrrp group vlan200 vrid 200
      - set high-availability vrrp group vlan200 priority 100
      - set high-availability vrrp group vlan200 address 10.0.200.1/24
      - set high-availability vrrp sync-group vyos member vlan10
      - set high-availability vrrp sync-group vyos member vlan30
      - set high-availability vrrp sync-group vyos member vlan40
      - set high-availability vrrp sync-group vyos member vlan50
      - set high-availability vrrp sync-group vyos member vlan60
      - set high-availability vrrp sync-group vyos member vlan200

      # ── conntrack-sync (Stateful Failover via VLAN 100) ────
      - set service conntrack-sync interface eth6 peer 10.0.100.2
      - set service conntrack-sync accept-protocol tcp,udp,icmp
      - set service conntrack-sync failover-mechanism vrrp sync-group vyos

      # ── BGP AS 65200 — ECMP zu allen Cilium Nodes ──────────
      - set protocols bgp system-as 65200
      - set protocols bgp neighbor 10.0.100.11 remote-as 65100
      - set protocols bgp neighbor 10.0.100.11 address-family ipv4-unicast soft-reconfiguration inbound
      - set protocols bgp neighbor 10.0.100.12 remote-as 65100
      - set protocols bgp neighbor 10.0.100.12 address-family ipv4-unicast soft-reconfiguration inbound
      - set protocols bgp neighbor 10.0.100.13 remote-as 65100
      - set protocols bgp neighbor 10.0.100.13 address-family ipv4-unicast soft-reconfiguration inbound
      - set protocols bgp parameters graceful-restart

      # ── NAT (RFC1918 + Pod-CIDR → WAN) ────────────────────
      - set nat source rule 100 outbound-interface name eth0
      - set nat source rule 100 source address 10.0.0.0/8
      - set nat source rule 100 translation address masquerade
      - set nat source rule 110 outbound-interface name eth0
      - set nat source rule 110 source address 10.244.0.0/16
      - set nat source rule 110 translation address masquerade

      # ── DHCP (VLANs 10/30/40/60) ──────────────────────────
      - set service dhcp-server shared-network-name dmz subnet 10.0.10.0/24 default-router 10.0.10.1
      - set service dhcp-server shared-network-name dmz subnet 10.0.10.0/24 name-server 10.0.10.1
      - set service dhcp-server shared-network-name dmz subnet 10.0.10.0/24 range 0 start 10.0.10.50
      - set service dhcp-server shared-network-name dmz subnet 10.0.10.0/24 range 0 stop 10.0.10.200
      - set service dhcp-server shared-network-name wifi subnet 10.0.30.0/24 default-router 10.0.30.1
      - set service dhcp-server shared-network-name wifi subnet 10.0.30.0/24 name-server 10.0.30.1
      - set service dhcp-server shared-network-name wifi subnet 10.0.30.0/24 range 0 start 10.0.30.50
      - set service dhcp-server shared-network-name wifi subnet 10.0.30.0/24 range 0 stop 10.0.30.200
      - set service dhcp-server shared-network-name client subnet 10.0.40.0/24 default-router 10.0.40.1
      - set service dhcp-server shared-network-name client subnet 10.0.40.0/24 name-server 10.0.40.1
      - set service dhcp-server shared-network-name client subnet 10.0.40.0/24 range 0 start 10.0.40.50
      - set service dhcp-server shared-network-name client subnet 10.0.40.0/24 range 0 stop 10.0.40.200
      - set service dhcp-server shared-network-name wifisec subnet 10.0.60.0/24 default-router 10.0.60.1
      - set service dhcp-server shared-network-name wifisec subnet 10.0.60.0/24 name-server 10.0.60.1
      - set service dhcp-server shared-network-name wifisec subnet 10.0.60.0/24 range 0 start 10.0.60.50
      - set service dhcp-server shared-network-name wifisec subnet 10.0.60.0/24 range 0 stop 10.0.60.200

      # ── DNS Relay ──────────────────────────────────────────
      - set service dns forwarding listen-address 10.0.10.1
      - set service dns forwarding listen-address 10.0.30.1
      - set service dns forwarding listen-address 10.0.40.1
      - set service dns forwarding listen-address 10.0.60.1
      - set service dns forwarding name-server 1.1.1.1
      - set service dns forwarding name-server 8.8.8.8
      - set service dns forwarding allow-from 10.0.0.0/8

      # ── Firewall ───────────────────────────────────────────
      - set firewall zone WAN interface eth0
      - set firewall zone WAN default-action drop
      - set firewall zone LAN interface eth4
      - set firewall zone LAN interface eth6
      - set firewall zone LAN default-action accept
      - set firewall zone DMZ interface eth1
      - set firewall zone DMZ default-action accept
      - set firewall ipv4 name WAN-LOCAL default-action drop
      - set firewall ipv4 name WAN-LOCAL rule 10 action accept
      - set firewall ipv4 name WAN-LOCAL rule 10 state established
      - set firewall ipv4 name WAN-LOCAL rule 10 state related
      - set firewall ipv4 name WAN-LAN default-action drop
      - set firewall ipv4 name WAN-LAN rule 10 action accept
      - set firewall ipv4 name WAN-LAN rule 10 state established
      - set firewall ipv4 name WAN-LAN rule 10 state related

      # ── System ─────────────────────────────────────────────
      - set system host-name vyos-02
      - set system time-zone Europe/Vienna
      - set system ntp server time.cloudflare.com
      - set service ssh listen-address 10.0.100.3
      - set service ssh listen-address 10.0.200.3
      - set system login user admin authentication public-keys main type ssh-ed25519
      - set system login user admin authentication public-keys main key 'AAAAC3NzaC1lZDI1NTE5AAAAIGt1cCMyHiOOBXG+BRus/fHXML2CNe0eYSFgDYq4AOTV'
      - delete system login user vyos
      - set service ssh disable-password-authentication
