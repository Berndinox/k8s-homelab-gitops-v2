apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels: {app: zot}
  template:
    metadata:
      labels: {app: zot}
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
          ports: [{containerPort: 5000}]
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
            - name: config
              mountPath: /etc/zot
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: zot-data}
        - name: config
          configMap:
            name: zot-config
            items:
              - key: config.json
                path: config.json
