apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-cnao
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  prune: false
  path: ./kubernetes/core/cnao
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: core-kubevirt
  wait: true
