apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-cilium
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  # CNI kritisch — manuell triggern: flux reconcile ks core-cilium --with-source
  suspend: true
  prune: false
  path: ./kubernetes/core/cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
