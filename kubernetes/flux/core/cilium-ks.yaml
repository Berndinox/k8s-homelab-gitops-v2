apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-cilium
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  suspend: false
  prune: false
  path: ./kubernetes/core/cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
