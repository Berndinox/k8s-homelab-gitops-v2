apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-vyos
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: core-multus
    - name: core-kubevirt
  prune: true
  path: ./kubernetes/infra/vyos/manifests
  sourceRef:
    kind: GitRepository
    name: flux-system
