apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-mikrotik
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infra-sealed-secrets
  prune: true
  path: ./kubernetes/infra/mikrotik/manifests
  sourceRef:
    kind: GitRepository
    name: flux-system
