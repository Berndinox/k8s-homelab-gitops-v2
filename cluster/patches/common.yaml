---
machine:
  network:
    nameservers:
      - 9.9.9.9         # Quad9 — Schweizer Non-Profit, GDPR, Malware-Blocking
      - 149.112.112.112 # Quad9 secondary

  time:
    servers:
      - time.cloudflare.com
      - 0.pool.ntp.org

  # Longhorn: dedicated mount for the 2TB data NVMe (nvme0n1 auf allen M920x)
  # DEAKTIVIERT: nvme0n1 hat noch alte Ubuntu/LVM-Partitionen (vfat != xfs mismatch)
  # Fix: nvme0n1 zuerst wischen, dann wieder aktivieren (siehe docs/longhorn-disk.md)
  # disks:
  #   - device: /dev/nvme0n1
  #     partitions:
  #       - mountpoint: /var/mnt/longhorn
  #
  # kubelet:
  #   extraMounts:
  #     - destination: /var/mnt/longhorn
  #       type: bind
  #       source: /var/mnt/longhorn
  #       options:
  #         - bind
  #         - rshared
  #         - rw

  # Kata Containers: VyOS rootfs (~400MB) braucht mehr Zeit fuer VM-Boot
  kubelet:
    extraConfig:
      runtimeRequestTimeout: 5m0s

  files:
    # Custom Kata config — ueberschreibt die Extension-Config direkt am Originalort
    # Aenderungen gegenueber Original:
    # - create_container_timeout: 60 → 300 (VyOS rootfs ~400MB)
    # - enable_annotations: alle erlaubt (fuer Pod-level overrides)
    # Hinweis: kubectl exec funktioniert nicht (bekannter Kata-Bug #10733 cgroupv2+systemd)
    # Workaround: VyOS-Konfiguration via GitOps ConfigMap/Secrets
    - path: /usr/local/share/kata-containers/configuration.toml
      permissions: 0o644
      op: overwrite
      content: |
        [hypervisor.clh]
        path = "/usr/local/bin/cloud-hypervisor"
        kernel = "/usr/local/share/kata-containers/vmlinux.container"
        image = "/usr/local/share/kata-containers/kata-containers.img"
        rootfs_type = "ext4"
        disable_selinux = false
        disable_guest_selinux = true
        enable_annotations = [".*"]
        valid_hypervisor_paths = ["/usr/local/bin/cloud-hypervisor"]
        kernel_params = "cgroup_no_v1=all systemd.unified_cgroup_hierarchy=1"
        default_vcpus = 1
        default_maxvcpus = 0
        default_memory = 2048
        default_maxmemory = 0
        shared_fs = "virtio-fs"
        virtio_fs_daemon = "/usr/local/libexec/virtiofsd"
        valid_virtio_fs_daemon_paths = ["/usr/local/libexec/virtiofsd"]
        virtio_fs_cache_size = 0
        virtio_fs_queue_size = 1024
        virtio_fs_extra_args = ["--thread-pool-size=1", "--announce-submounts"]
        virtio_fs_cache = "auto"
        block_device_driver = "virtio-blk"
        [agent.kata]
        dial_timeout = 45
        [runtime]
        internetworking_model = "tcfilter"
        disable_guest_seccomp = true
        sandbox_cgroup_only = false
        static_sandbox_resource_mgmt = false
        sandbox_bind_mounts = []
        vfio_mode = "guest-kernel"
        disable_guest_empty_dir = false
        experimental = []
        create_container_timeout = 300
        dan_conf = "/run/kata-containers/dans"

  sysctls:
    fs.inotify.max_user_watches: "1048576"
    fs.inotify.max_user_instances: "8192"
    kernel.panic: "10"
